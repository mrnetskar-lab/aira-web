<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIRA — Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0c;
      color: #e8e8ec;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 24px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    header span {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2px;
      padding: 2px;
    }

    .grid__item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: #111;
    }

    .grid__item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .grid__item:hover img {
      transform: scale(1.03);
    }

    .grid__item__label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .grid__item:hover .grid__item__label {
      opacity: 1;
    }

    .empty {
      padding: 60px 24px;
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.9rem;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      cursor: zoom-out;
    }

    .lightbox.hidden { display: none; }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }

    .lightbox__close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }
  </style>
</head>
<body>

<header>
  <h1>Gallery</h1>
  <span id="shotCount"></span>
</header>

<div id="grid" class="grid"></div>

<div id="lightbox" class="lightbox hidden">
  <button class="lightbox__close" id="lightboxClose">&#x2715;</button>
  <img id="lightboxImg" src="" alt="" />
</div>

<script>
  async function load() {
    const res = await fetch('/api/camera/list');
    const data = await res.json();
    const shots = data.shots || [];

    document.getElementById('shotCount').textContent = `${shots.length} shot${shots.length !== 1 ? 's' : ''}`;

    const grid = document.getElementById('grid');

    if (!shots.length) {
      grid.innerHTML = '<div class="empty">No shots yet. Use the dev panel to capture a scene.</div>';
      return;
    }

    grid.innerHTML = shots.map((s) => `
      <div class="grid__item" data-src="${s.path}">
        <img src="${s.path}" alt="${s.filename}" loading="lazy" />
        <div class="grid__item__label">${s.filename}</div>
      </div>
    `).join('');

    grid.querySelectorAll('.grid__item').forEach((item) => {
      item.addEventListener('click', () => openLightbox(item.dataset.src));
    });
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.remove('hidden');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightboxImg').src = '';
  }

  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  load();
</script>
</body>
</html>
