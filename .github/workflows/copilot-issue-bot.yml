name: Copilot Issue Bot

on:
  issues:
    types: [opened, edited]

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install requests

      - name: Run issue handler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_API_URL: ${{ secrets.COPILOT_API_URL }}
          COPILOT_API_TOKEN: ${{ secrets.COPILOT_API_TOKEN }}
        run: python scripts/issue_handler.py
