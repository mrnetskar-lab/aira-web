<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AIRA</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="phone">
    <div class="phone-screen">

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-time" id="statusTime">9:41</span>
        <span class="status-brand">AIRA</span>
        <span class="status-signal">●●●</span>
      </div>

      <!-- Home screen -->
      <div id="homeScreen" class="screen active">
        <div class="home-content">
          <div class="home-greeting">
            <p class="home-label">AIRA OS</p>
            <h1 class="home-title">Good evening.</h1>
          </div>
          <div class="app-grid">
            <button class="app-icon" data-app="chat">
              <div class="app-icon-bg icon-chat"></div>
              <span>Chat</span>
            </button>
            <button class="app-icon" data-app="contacts">
              <div class="app-icon-bg icon-contacts"></div>
              <span>Contacts</span>
            </button>
            <button class="app-icon" data-app="messages">
              <div class="app-icon-bg icon-messages"></div>
              <span>Messages</span>
            </button>
          </div>
        </div>
        <div class="home-dock">
          <button class="app-icon dock-icon" data-app="chat">
            <div class="app-icon-bg icon-chat"></div>
          </button>
        </div>
      </div>

      <!-- Chat screen -->
      <div id="chatScreen" class="screen">
        <div class="app-bar">
          <button id="backBtn" class="app-back-btn">&#8249;</button>
          <div class="app-bar-info">
            <span class="app-bar-title">Living Room</span>
            <span class="app-bar-sub" id="roomStatus">Late evening</span>
          </div>
          <div class="presence-dot" id="presenceDot"></div>
        </div>

        <div id="log" class="chat-log"></div>

        <div class="chip-row">
          <button class="chip-btn" data-prompt="truth or dare">Truth or dare</button>
          <button class="chip-btn" data-prompt="let's talk honestly">Be honest</button>
          <button class="chip-btn" data-prompt="i want to get closer to lucy">Closer to Lucy</button>
          <button class="chip-btn" data-prompt="sam, what do you really think">Ask Sam</button>
        </div>

        <form id="form" class="chat-bar" autocomplete="off">
          <input id="input" type="text" placeholder="Message..." />
          <button type="submit" class="send-btn">&#8593;</button>
        </form>
      </div>

      <!-- Contacts screen -->
      <div id="contactsScreen" class="screen">
        <div class="app-bar">
          <button class="app-back-btn" data-back="home">&#8249;</button>
          <div class="app-bar-info">
            <span class="app-bar-title">Contacts</span>
          </div>
        </div>
        <div class="contacts-list">
          <div class="contact-item" data-open="chat">
            <div class="contact-avatar avatar-lucy"></div>
            <div class="contact-info">
              <span class="contact-name">Lucy</span>
              <span class="contact-status">Warm, intuitive</span>
            </div>
          </div>
          <div class="contact-item" data-open="chat">
            <div class="contact-avatar avatar-sam"></div>
            <div class="contact-info">
              <span class="contact-name">Sam</span>
              <span class="contact-status">Guarded, observant</span>
            </div>
          </div>
          <div class="contact-item" data-open="chat">
            <div class="contact-avatar avatar-angie"></div>
            <div class="contact-info">
              <span class="contact-name">Angie</span>
              <span class="contact-status">Playful, charming</span>
            </div>
          </div>
        </div>
      </div>

    </div>
    <div class="phone-indicator"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
