<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AIRA</title>
    <meta
      name="description"
      content="AIRA Web — Messenger and World Chat."
    />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="build" content="20260412-c" />
    <link rel="stylesheet" href="./style.css?v=20260412-c" />
  </head>
  <body>
    <div class="app-shell">
      <main class="screen-stack">
        <section id="chatView" class="view view--active" aria-label="World Chat Main Stage">
          <div class="chat-view chat-view--world">
            <header class="topbar topbar--minimal">
              <button
                id="backToHomeBtn"
                class="arrow-button"
                type="button"
                aria-label="Back"
              >
                <span aria-hidden="true">&#8592;</span>
              </button>

              <div class="topbar-brand" aria-label="World Chat">
                <span class="topbar-brand__ring" aria-hidden="true"></span>
                <span class="topbar-brand__text">World Chat</span>
              </div>

              <button
                id="serverHeartbeat"
                class="topbar-heartbeat is-unknown"
                type="button"
                aria-live="polite"
                aria-label="Server status unknown"
                title="Server status: checking"
              >
                <span class="topbar-heartbeat__dot" aria-hidden="true"></span>
                <span class="sr-only">Server status indicator</span>
              </button>
            </header>

            <div
              id="worldPresenceState"
              class="world-presence-state"
              aria-live="polite"
              hidden
            >
              You stepped out of the room.
            </div>

            <div id="chatMessages" class="chat-messages" aria-live="polite">
              <div class="message-row message-row--system">
                <div class="system-note">
                  The room is quiet. Start with something small.
                </div>
              </div>
            </div>

            <form id="chatForm" class="composer" autocomplete="off">
              <label class="sr-only" for="chatInput">Message</label>
              <textarea
                id="chatInput"
                class="composer__input"
                rows="1"
                maxlength="1200"
                placeholder="Say something..."
              ></textarea>
              <button id="sendBtn" class="composer__send" type="submit" aria-label="Send message">
                <span aria-hidden="true">&#8594;</span>
                <span class="sr-only">Send</span>
              </button>
            </form>

          </div>
        </section>

        <section
          id="phoneView"
          class="phone-view"
          aria-label="Phone"
          aria-hidden="true"
        >
          <div id="phoneScrim" class="phone-view__scrim"></div>

          <div id="phoneSheet" class="phone-sheet">
            <div
              id="phoneGrabber"
              class="phone-sheet__grabber"
              aria-hidden="true"
            >
              <span class="phone-sheet__grabber-bar"></span>
            </div>

            <div id="phoneHome" class="phone-home" aria-label="Phone home">
              <div class="phone-home__wallpaper"></div>
              <div class="phone-home__veil"></div>

              <div class="phone-home__content">

                <div class="phone-home__hero">
                  <div class="phone-home__hero-card">
                    <div class="phone-home__hero-label">AIRA</div>
                    <div class="phone-home__hero-title">Phone</div>
                    <div class="phone-home__hero-text">
                      You stepped out of the room.
                    </div>
                  </div>
                </div>

                <div class="phone-home__apps">
                  <button
                    class="phone-app-icon"
                    type="button"
                    data-phone-app="messages"
                    aria-label="Open Messenger"
                  >
                    <span class="phone-app-icon__glyph phone-app-icon__glyph--ring" aria-hidden="true"></span>
                    <span class="phone-app-icon__label">Messenger</span>
                  </button>

                  <button
                    class="phone-app-icon"
                    type="button"
                    data-phone-app="notes"
                    aria-label="Notes"
                  >
                    <span class="phone-app-icon__glyph phone-app-icon__glyph--soft" aria-hidden="true"></span>
                    <span class="phone-app-icon__label">Notes</span>
                  </button>

                  <button
                    class="phone-app-icon"
                    type="button"
                    data-phone-app="calls"
                    aria-label="Calls"
                  >
                    <span class="phone-app-icon__glyph phone-app-icon__glyph--soft" aria-hidden="true"></span>
                    <span class="phone-app-icon__label">Calls</span>
                  </button>

                  <button
                    class="phone-app-icon"
                    type="button"
                    data-phone-app="void"
                    aria-label="Void"
                  >
                    <span class="phone-app-icon__glyph phone-app-icon__glyph--soft" aria-hidden="true"></span>
                    <span class="phone-app-icon__label">Void</span>
                  </button>

                  <button
                    class="phone-app-icon"
                    type="button"
                    data-phone-app="gallery"
                    aria-label="Photos"
                  >
                    <span class="phone-app-icon__glyph phone-app-icon__glyph--gallery" aria-hidden="true"></span>
                    <span class="phone-app-icon__label">Photos</span>
                  </button>

                  <button
                    class="phone-app-icon"
                    type="button"
                    data-phone-app="snap"
                    aria-label="Snap Back"
                  >
                    <span class="phone-app-icon__glyph phone-app-icon__glyph--snap" aria-hidden="true"></span>
                    <span class="phone-app-icon__label">Snap Back</span>
                  </button>
                </div>

                <div class="phone-dock" aria-label="Phone dock">
                  <button
                    class="phone-dock__app"
                    type="button"
                    data-phone-app="messages"
                    aria-label="Open Messenger"
                  >
                    <span class="phone-dock__icon" aria-hidden="true">
                      <span class="phone-dock__ring"></span>
                    </span>
                  </button>

                  <button
                    class="phone-dock__app"
                    type="button"
                    data-phone-app="notes"
                    aria-label="Notes"
                  >
                    <span class="phone-dock__icon phone-dock__icon--soft" aria-hidden="true"></span>
                  </button>
                </div>
              </div>
            </div>

            <div
              id="phoneAppLayer"
              class="phone-app-layer"
              aria-label="Phone app"
              hidden
            >
              <!-- ─── Snap Back App ─────────────────────────────────────── -->
              <section
                id="phoneSnapApp"
                class="phone-app-screen phone-app-screen--snap"
                aria-label="Snap Back"
                hidden
              >
                <button
                  id="phoneSnapBackBtn"
                  class="phone-snap__back"
                  type="button"
                  aria-label="Back"
                >
                  <span aria-hidden="true">&#8592;</span>
                </button>

                <div id="phoneSnapViewfinder" class="phone-snap__viewfinder">
                  <div id="phoneSnapIdle" class="phone-snap__idle">
                    <div class="phone-snap__idle-icon" aria-hidden="true"></div>
                    <div class="phone-snap__idle-hint">Tap the shutter</div>
                  </div>

                  <div id="phoneSnapSpinner" class="phone-snap__spinner hidden" aria-live="polite">
                    <div class="phone-snap__spinner-ring"></div>
                    <div class="phone-snap__spinner-label">Capturing…</div>
                  </div>

                  <img
                    id="phoneSnapResult"
                    class="phone-snap__result hidden"
                    src=""
                    alt="Captured scene"
                  />
                </div>

                <div class="phone-snap__controls">
                  <button
                    id="phoneSnapSaveBtn"
                    class="phone-snap__action phone-snap__action--save hidden"
                    type="button"
                    aria-label="Save to Photos"
                  >Save</button>

                  <button
                    id="phoneSnapShutterBtn"
                    class="phone-snap__shutter"
                    type="button"
                    aria-label="Capture scene"
                  >
                    <span class="phone-snap__shutter-inner" aria-hidden="true"></span>
                  </button>

                  <button
                    id="phoneSnapRetakeBtn"
                    class="phone-snap__action phone-snap__action--retake hidden"
                    type="button"
                    aria-label="New shot"
                  >New shot</button>
                </div>
              </section>

              <section
                id="phoneGalleryApp"
                class="phone-app-screen phone-app-screen--gallery"
                aria-label="Photos"
                hidden
              >
                <header class="phone-app-topbar">
                  <button
                    id="phoneGalleryBackBtn"
                    class="phone-app-back"
                    type="button"
                    aria-label="Back"
                  >
                    <span aria-hidden="true">&#8592;</span>
                    <span class="phone-app-back__label">Back</span>
                  </button>
                  <div class="phone-app-topbar__title">Photos</div>
                  <button
                    id="phoneGalleryCaptureBtn"
                    class="phone-gallery-capture-btn"
                    type="button"
                    aria-label="Capture scene"
                    title="Generate a scene photo"
                  >
                    <span class="phone-gallery-capture-btn__icon" aria-hidden="true"></span>
                  </button>
                </header>
                <div id="phoneGalleryGrid" class="phone-gallery-grid"></div>
                <div id="phoneGalleryGenerating" class="phone-gallery-generating hidden" aria-live="polite" aria-label="Generating photo">
                  <div class="phone-gallery-generating__ring"></div>
                  <div class="phone-gallery-generating__label">Capturing scene…</div>
                </div>
                <div id="phoneGalleryLightbox" class="phone-gallery-lightbox hidden">
                  <button id="phoneGalleryLightboxClose" class="phone-gallery-lightbox__close" aria-label="Close">&#x2715;</button>
                  <img id="phoneGalleryLightboxImg" src="" alt="" />
                  <button id="phoneGalleryLightboxDelete" class="phone-gallery-lightbox__delete" aria-label="Delete photo">Delete</button>
                </div>
              </section>

              <section
                id="phoneMessagesApp"
                class="phone-app-screen phone-app-screen--messages"
                aria-label="Messenger"
                hidden
              >
                <header class="phone-app-topbar">
                  <button
                    id="phoneMessagesBackBtn"
                    class="phone-app-back"
                    type="button"
                    aria-label="Back"
                  >
                    <span aria-hidden="true">&#8592;</span>
                    <span class="phone-app-back__label">Back</span>
                  </button>

                  <div class="phone-app-topbar__title">Messenger</div>

                  <div class="phone-app-topbar__spacer" aria-hidden="true"></div>
                </header>

                <div id="phoneMessagesList" class="phone-messages-list"></div>

                <div id="phoneMessagesThread" class="phone-messages-thread hidden">
                  <header class="phone-thread-topbar">
                    <button
                      id="phoneThreadBackBtn"
                      class="phone-app-back"
                      type="button"
                      aria-label="Back to inbox"
                    >
                      <span aria-hidden="true">&#8592;</span>
                      <span class="phone-app-back__label">Back</span>
                    </button>

                    <div class="phone-thread-title-wrap">
                      <div class="phone-thread-avatar" aria-hidden="true">
                        <span class="phone-thread-avatar__glyph"></span>
                      </div>
                      <div id="phoneMessagesTitle" class="phone-thread-title"></div>
                      <div class="phone-thread-subtitle">Text Message</div>
                    </div>

                    <div class="phone-app-topbar__spacer" aria-hidden="true"></div>
                  </header>

                  <div id="phoneMessagesLog" class="phone-messages-log" aria-live="polite"></div>

                  <form id="phoneMessagesForm" class="phone-messages-composer" autocomplete="off">
                    <input
                      id="phoneMessagesInput"
                      class="phone-messages-input"
                      type="text"
                      placeholder="Message..."
                      maxlength="600"
                      autocomplete="off"
                    />
                    <button class="phone-messages-send" type="submit">Send</button>
                  </form>
                </div>
              </section>
            </div>
          </div>
        </section>
      </main>

      <div
        id="phoneHandle"
        class="phone-handle"
        role="button"
        aria-label="Open phone"
        aria-expanded="false"
        tabindex="0"
      >
        <span class="phone-handle__bar" aria-hidden="true"></span>
      </div>
    </div>

    <script type="module" src="./app.js?v=20260412-b"></script>
  </body>
</html>
