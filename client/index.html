<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AIRA</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="phone">
    <div class="phone-screen">

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-time" id="statusTime">9:41</span>
        <span class="status-brand">AIRA</span>
        <span class="status-signal">●●●</span>
      </div>

      <!-- Home screen -->
      <div id="homeScreen" class="screen active">
        <div class="home-content">
          <div class="home-hero">
            <div class="aira-logo">AIRA</div>
            <div class="home-clock" id="homeClock">9:41</div>
          </div>
          <div class="app-grid">
            <button class="app-icon" data-app="chat">
              <div class="app-icon-bg icon-chat"></div>
              <span>Chat</span>
            </button>
            <button class="app-icon" data-app="messages">
              <div class="app-icon-bg icon-messages"></div>
              <span>Messages</span>
            </button>
            <button class="app-icon" data-app="gallery">
              <div class="app-icon-bg icon-gallery"></div>
              <span>Gallery</span>
            </button>
            <button class="app-icon" data-app="clues">
              <div class="app-icon-bg icon-clues"></div>
              <span>Clues</span>
            </button>
            <button class="app-icon" data-app="settings">
              <div class="app-icon-bg icon-settings"></div>
              <span>Settings</span>
            </button>
          </div>
        </div>
        <div class="home-dock">
          <button class="app-icon dock-icon" data-app="chat">
            <div class="app-icon-bg icon-chat"></div>
          </button>
        </div>
      </div>

      <!-- Chat screen -->
      <div id="chatScreen" class="screen">
        <div class="app-bar">
          <button id="backBtn" class="app-back-btn">&#8249;</button>
          <span class="app-bar-mark">AIRA</span>
          <div class="presence-dot" id="presenceDot"></div>
        </div>

        <div id="log" class="chat-log"></div>

        <div class="chip-row">
          <button class="chip-btn" data-prompt="truth or dare">Truth or dare</button>
          <button class="chip-btn" data-prompt="let's talk honestly">Be honest</button>
          <button class="chip-btn" data-prompt="i want to get closer to lucy">Closer to Lucy</button>
          <button class="chip-btn" data-prompt="sam, what do you really think">Ask Sam</button>
        </div>

        <form id="form" class="chat-bar" autocomplete="off">
          <input id="input" type="text" placeholder="Message..." />
          <button type="submit" class="send-btn">&#8593;</button>
        </form>
      </div>

      <!-- Placeholder screen (Messages / Gallery / Clues / Settings) -->
      <div id="placeholderScreen" class="screen">
        <div class="app-bar">
          <button class="app-back-btn" data-back="home">&#8249;</button>
          <span class="app-bar-mark" id="placeholderTitle">App</span>
        </div>
        <div class="placeholder-body">
          <div class="placeholder-icon" id="placeholderIcon"></div>
          <p class="placeholder-label" id="placeholderLabel">Coming soon</p>
          <p class="placeholder-sub">This feature is being built.</p>
        </div>
      </div>

    </div>
    <div class="phone-indicator"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
