<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nina · Second Time Around</title>
  <style>
    :root {
      --bg:        #0c0906;
      --bg-2:      #13100c;
      --text:      #f2ece4;
      --text-soft: rgba(242, 236, 228, 0.58);
      --text-muted:rgba(242, 236, 228, 0.36);
      --line:      rgba(255, 255, 255, 0.05);

      /* Nina's palette — warm amber/cream, softer than Hazel */
      --ni:        #d4956a;
      --ni-2:      #b87a52;
      --ni-glow:   rgba(212, 149, 106, 0.20);
      --ni-soft:   rgba(212, 149, 106, 0.10);
      --ni-mist:   rgba(212, 149, 106, 0.05);
      --ni-cream:  rgba(255, 235, 200, 0.06);

      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    body {
      opacity: 0;
      animation: ni-fade-in 0.6s ease 0.05s forwards;
      background:
        radial-gradient(ellipse at 60% 0%,   rgba(212, 149, 106, 0.10), transparent 40%),
        radial-gradient(ellipse at 10% 80%,  rgba(180, 120,  70, 0.07), transparent 30%),
        radial-gradient(ellipse at 90% 90%,  rgba(100,  80,  50, 0.05), transparent 25%),
        linear-gradient(160deg, #0d0a07 0%, #110e09 60%, #0a0806 100%);
      color: var(--text);
      overflow: hidden;
    }

    @keyframes ni-fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Warm window light ───────────────────────────────────────── */
    .room-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .room-bg::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(
        130deg,
        transparent 0%,
        transparent 50%,
        rgba(220, 168, 100, 0.04) 60%,
        rgba(220, 168, 100, 0.08) 66%,
        rgba(220, 168, 100, 0.03) 72%,
        transparent 80%
      );
    }

    /* ── Shell layout ────────────────────────────────────────────── */
    .shell {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Left: stage ─────────────────────────────────────────────── */
    .stage {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    /* ── Header ──────────────────────────────────────────────────── */
    .room-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 28px 16px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .room-header__back {
      background: none; border: none; cursor: pointer;
      color: var(--text-soft); font-size: 0.85rem;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 0;
      transition: color 0.2s;
    }
    .room-header__back:hover { color: var(--text); }
    .room-header__back-arrow { font-size: 1.1rem; }

    .room-header__identity {
      display: flex; align-items: center; gap: 12px; flex: 1;
    }
    .room-header__avatar {
      width: 42px; height: 42px;
      border-radius: 13px;
      overflow: hidden;
      border: 1.5px solid rgba(212, 149, 106, 0.28);
      box-shadow: 0 0 14px rgba(212, 149, 106, 0.18);
      flex-shrink: 0;
      background: rgba(212, 149, 106, 0.08);
    }
    .room-header__avatar img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .room-header__name {
      font-size: 1.05rem; font-weight: 600; color: var(--text);
      letter-spacing: -0.01em;
    }
    .room-header__state {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; color: var(--text-muted);
      margin-top: 2px;
    }
    .state-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ni);
      box-shadow: 0 0 8px var(--ni-glow);
      animation: ni-pulse 4s ease-in-out infinite;
    }
    @keyframes ni-pulse {
      0%,100% { opacity: 0.7; } 50% { opacity: 1; box-shadow: 0 0 14px var(--ni-glow); }
    }

    /* ── Beat indicator strip ────────────────────────────────────── */
    .beat-strip {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 28px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .beat-strip__label {
      font-size: 0.72rem;
      color: var(--ni);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .beat-strip__atmosphere {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .beat-dots {
      display: flex; gap: 4px; margin-left: auto;
    }
    .beat-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(212, 149, 106, 0.18);
      transition: background 0.4s ease;
    }
    .beat-dot.done  { background: rgba(212, 149, 106, 0.55); }
    .beat-dot.active { background: var(--ni); box-shadow: 0 0 6px var(--ni-glow); }

    /* ── Thread ──────────────────────────────────────────────────── */
    .thread {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 22px 28px;
      min-height: 0;
      scroll-behavior: smooth;
    }
    .thread::-webkit-scrollbar { width: 3px; }
    .thread::-webkit-scrollbar-track { background: transparent; }
    .thread::-webkit-scrollbar-thumb { background: rgba(212,149,106,0.15); border-radius: 3px; }

    .line {
      max-width: 560px;
      padding: 13px 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(28,22,15,0.97), rgba(20,16,11,0.97));
      border: 1px solid rgba(255,255,255,0.04);
    }
    .line--her {
      align-self: flex-start;
      border-left: 2px solid var(--ni-soft);
    }
    .line--you {
      align-self: flex-end;
      background: linear-gradient(180deg, rgba(60,40,22,0.38), rgba(44,28,14,0.38));
      border-color: rgba(212,149,106,0.10);
    }
    .line--warm {
      border-left-color: rgba(212,149,106,0.35);
      background: linear-gradient(180deg, rgba(32,24,14,0.98), rgba(24,18,10,0.98));
    }
    .line--beat {
      /* Opening line for each beat — slightly distinct */
      border-left-color: rgba(212,149,106,0.45);
      background: linear-gradient(180deg, rgba(34,25,14,0.99), rgba(26,19,10,0.99));
    }
    .line__name {
      display: block;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ni); margin-bottom: 5px;
    }
    .line--you .line__name { color: rgba(242,236,228,0.36); }
    .line p { margin: 0; color: rgba(242,236,228,0.84); line-height: 1.54; font-size: 14.5px; }

    /* ── Beat transition marker ──────────────────────────────────── */
    .beat-marker {
      align-self: center;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.06em;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(212,149,106,0.05);
      border: 1px solid rgba(212,149,106,0.08);
    }

    /* ── Choice buttons (beat 6) ─────────────────────────────────── */
    .choice-block {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 8px 0 4px;
      align-self: flex-start;
    }
    .choice-btn {
      padding: 9px 18px;
      border-radius: 14px;
      border: 1px solid rgba(212,149,106,0.22);
      background: rgba(212,149,106,0.06);
      color: var(--text-soft);
      font-size: 13px; cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .choice-btn:hover {
      background: rgba(212,149,106,0.14);
      border-color: rgba(212,149,106,0.40);
      color: var(--text);
    }
    .choice-btn.chosen {
      background: rgba(212,149,106,0.18);
      border-color: var(--ni);
      color: var(--text);
    }

    /* ── Composer ────────────────────────────────────────────────── */
    .composer {
      flex-shrink: 0;
      padding: 16px 28px 24px;
      border-top: 1px solid var(--line);
    }
    .composer__hint {
      font-size: 11px; color: var(--text-muted);
      margin-bottom: 8px; letter-spacing: 0.02em;
    }
    .composer__row {
      display: flex; gap: 10px;
    }
    .composer__input {
      flex: 1; min-width: 0;
      height: 50px; font-size: 1rem;
      padding: 0 16px;
      border-radius: 16px;
      border: 1.5px solid rgba(212,149,106,0.13);
      background: rgba(255,255,255,0.025);
      color: var(--text);
      transition: border-color 0.2s;
    }
    .composer__input:focus {
      outline: none;
      border-color: rgba(212,149,106,0.28);
    }
    .composer__input::placeholder { color: rgba(242,236,228,0.32); }
    .composer__send {
      width: 50px; height: 50px;
      border-radius: 14px; border: none;
      background: linear-gradient(180deg, #d4956a 0%, #c07d55 100%);
      color: #fff; font-size: 1.2rem; cursor: pointer;
      transition: opacity 0.2s;
    }
    .composer__send:hover { opacity: 0.88; }
    .composer__send:disabled { opacity: 0.38; cursor: default; }

    /* ── Right panel ─────────────────────────────────────────────── */
    .panel {
      display: flex; flex-direction: column;
      padding: 24px 20px;
      gap: 22px;
      overflow-y: auto;
    }
    .panel::-webkit-scrollbar { display: none; }

    .panel-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 18px;
    }
    .panel-block__eyebrow {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ni); margin-bottom: 10px;
    }
    .panel-block__title {
      font-size: 0.97rem; font-weight: 600;
      color: var(--text); line-height: 1.38; margin-bottom: 7px;
    }
    .panel-block__body {
      font-size: 0.80rem; color: var(--text-soft); line-height: 1.55;
    }
    .panel-chips {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .panel-chip {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px;
      background: rgba(212,149,106,0.08);
      border: 1px solid rgba(212,149,106,0.14);
      color: var(--text-muted);
    }
    .panel-chip--active {
      background: rgba(212,149,106,0.14);
      border-color: rgba(212,149,106,0.30);
      color: var(--ni);
    }

    /* Moment block */
    .moment-block { display: flex; flex-direction: column; gap: 10px; }
    .moment-trigger {
      width: 100%; padding: 11px;
      border-radius: 13px; border: 1px solid rgba(212,149,106,0.16);
      background: rgba(212,149,106,0.05);
      color: var(--text-muted); font-size: 0.85rem; cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .moment-trigger.is-ready {
      border-color: rgba(212,149,106,0.38);
      background: rgba(212,149,106,0.10);
      color: var(--ni);
    }
    .moment-trigger:disabled { opacity: 0.4; cursor: default; }
    .moment-img-wrap {
      border-radius: 15px; overflow: hidden;
      border: 1px solid rgba(212,149,106,0.12);
      display: none; opacity: 0;
      transition: opacity 0.5s ease;
    }
    .moment-img-wrap.visible { display: block; opacity: 1; }
    .moment-img-wrap img {
      display: block; width: 100%;
      min-height: 200px; max-height: 340px;
      object-fit: cover; object-position: center top;
      background: rgba(255,255,255,0.02);
    }
    .moment-caption {
      padding: 9px 12px;
      font-size: 11px; font-style: italic;
      color: var(--text-muted);
      background: rgba(16,12,8,0.80);
    }
  </style>
</head>
<body>
  <div class="room-bg" aria-hidden="true"></div>

  <div class="shell">
    <!-- LEFT: conversation -->
    <main class="stage">
      <header class="room-header">
        <button class="room-header__back" onclick="history.back()">
          <span class="room-header__back-arrow">‹</span>
          <span>The Lounge</span>
        </button>
        <div class="room-header__identity">
          <div class="room-header__avatar">
            <img src="/profile_pictures/nina.png" alt="Nina"
              onerror="this.style.display='none'" />
          </div>
          <div class="room-header__identity-text">
            <h1 class="room-header__name">Nina</h1>
            <div class="room-header__state">
              <span class="state-dot"></span>
              <span id="state-label">matched · Tinder · 3 minutes ago</span>
            </div>
          </div>
        </div>
      </header>

      <div class="beat-strip">
        <span class="beat-strip__label" id="beat-label">DM reconnect</span>
        <span class="beat-strip__atmosphere" id="beat-atmosphere">surreal · familiar · a little electric</span>
        <div class="beat-dots" id="beat-dots">
          <!-- 8 dots rendered by JS -->
        </div>
      </div>

      <section class="thread" id="thread" aria-label="Conversation"></section>

      <div class="composer">
        <div class="composer__hint" id="composer-hint">Say something. She's waiting.</div>
        <div class="composer__row">
          <input class="composer__input" id="input" type="text"
            placeholder="Say something…" maxlength="300" autocomplete="off" />
          <button type="button" class="composer-cam" aria-label="Camera">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
          <button class="composer__send" id="send" aria-label="Send">➤</button>
        </div>
      </div>
    </main>

    <!-- RIGHT: panel -->
    <aside class="panel">
      <div class="panel-block">
        <div class="panel-block__eyebrow">This thread</div>
        <h2 class="panel-block__title" id="panel-title">Something is being built here.</h2>
        <p class="panel-block__body" id="panel-body">
          It doesn't need to move fast. The longer you stay, the more she gives.
        </p>
        <div class="panel-chips">
          <span class="panel-chip panel-chip--active" id="panel-chip-1">familiarity</span>
          <span class="panel-chip" id="panel-chip-2">nostalgia</span>
          <span class="panel-chip" id="panel-chip-3">soft-ready</span>
        </div>
      </div>

      <div class="panel-block moment-block">
        <div class="panel-block__eyebrow">Moment</div>
        <button class="moment-trigger" id="moment-btn" disabled>
          Generate this moment
        </button>
        <div class="moment-img-wrap" id="moment-wrap">
          <img id="moment-img" src="" alt="" />
          <div class="moment-caption" id="moment-caption">A moment with Nina</div>
        </div>
      </div>
    </aside>
  </div>

<script type="module">
import { BEATS, INITIAL_STATE, buildBeatContext, buildStatePatch, CHARACTER }
  from '/src/engine/stories/second-time-around.js';

// ── State ─────────────────────────────────────────────────────────────────────
let beatIndex    = 0;
let exchangeCount = 0;  // exchanges within current beat
let choiceMade   = false;
let momentUnlocked = false;

const thread   = document.getElementById('thread');
const input    = document.getElementById('input');
const sendBtn  = document.getElementById('send');

// ── Init state on server ──────────────────────────────────────────────────────
async function initStoryState() {
  try {
    await fetch('/api/ai/state/patch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        relationships: { Nina: INITIAL_STATE },
        tension: 0.18
      })
    });
  } catch (e) { console.warn('State init failed', e); }
}

// ── Beat UI ───────────────────────────────────────────────────────────────────
function renderBeatDots() {
  const container = document.getElementById('beat-dots');
  container.innerHTML = BEATS.map((b, i) => {
    const cls = i < beatIndex ? 'beat-dot done'
              : i === beatIndex ? 'beat-dot active'
              : 'beat-dot';
    return `<span class="${cls}" title="${b.label}"></span>`;
  }).join('');
}

function updateBeatUI(beat) {
  document.getElementById('beat-label').textContent      = beat.label;
  document.getElementById('beat-atmosphere').textContent = beat.atmosphere;
  document.getElementById('state-label').textContent     = beat.index < 2
    ? 'matched · Tinder · just now'
    : beat.index < 4 ? 'talking · first meeting'
    : beat.index === 4 ? 'the reveal'
    : 'still here';
  renderBeatDots();
  updatePanel(beat);
}

function updatePanel(beat) {
  const titles = [
    'Something familiar, in a new form.',
    'The easy part. Enjoy it.',
    'In person now. Older. Still them.',
    'The years are in the room.',
    'She told you the truth.',
    'The thing neither of you said out loud.',
    'What happens next is up to you.',
    'This was real.'
  ];
  const bodies = [
    'You matched. You both know who the other person is. That changes everything.',
    'The years didn\'t take the ease away. That\'s rare.',
    'Familiarity doesn\'t need to be performed. Let it just be there.',
    'Some memories are sweeter the second time. Some are just true.',
    'She hesitated. Then she swiped. That\'s not a small thing.',
    'Drifting apart once doesn\'t mean it happens again. But it\'s worth naming.',
    'No wrong answer. Just an honest one.',
    'Some things don\'t need a big ending to be whole.'
  ];
  document.getElementById('panel-title').textContent = titles[beat.index] || titles[0];
  document.getElementById('panel-body').textContent  = bodies[beat.index] || bodies[0];

  // Chip updates
  const c1 = document.getElementById('panel-chip-1');
  const c2 = document.getElementById('panel-chip-2');
  const c3 = document.getElementById('panel-chip-3');
  if (beat.index >= 4) {
    c1.textContent = 'honest'; c1.classList.add('panel-chip--active');
    c2.textContent = 'vulnerable';
    c3.textContent = 'earned';
  } else if (beat.index >= 2) {
    c1.textContent = 'in person';
    c2.textContent = 'memory';
    c3.classList.add('panel-chip--active'); c3.textContent = 'building';
  }
}

// ── Render a message ──────────────────────────────────────────────────────────
function addLine(who, text, warm = false, isBeatOpener = false) {
  const el = document.createElement('article');
  const isHer = who === 'Nina';
  el.className = `line line--${isHer ? 'her' : 'you'}${warm ? ' line--warm' : ''}${isBeatOpener ? ' line--beat' : ''}`;
  el.innerHTML = `<span class="line__name">${who}</span><p>${escHtml(text)}</p>`;
  el.style.opacity = '0';
  el.style.transform = 'translateY(5px)';
  thread.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.45s ease, transform 0.45s ease';
    el.style.opacity = '1';
    el.style.transform = 'none';
  });
  thread.scrollTop = thread.scrollHeight;
  return el;
}

function addBeatMarker(label) {
  const el = document.createElement('div');
  el.className = 'beat-marker';
  el.textContent = label;
  el.style.opacity = '0';
  thread.appendChild(el);
  requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.6s ease';
    el.style.opacity = '1';
  });
  thread.scrollTop = thread.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Beat opening line ─────────────────────────────────────────────────────────
function playBeatOpener(beat) {
  if (beat.index > 0) {
    addBeatMarker(beat.label);
  }
  setTimeout(() => {
    addLine('Nina', beat.openingLine, false, true);
  }, beat.index === 0 ? 400 : 700);
}

// ── Advance to next beat ──────────────────────────────────────────────────────
async function advanceBeat() {
  const current = BEATS[beatIndex];

  // Apply state shift
  try {
    const patch = buildStatePatch(current);
    await fetch('/api/ai/state/patch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch)
    });
  } catch (e) { console.warn('State patch failed', e); }

  beatIndex++;
  exchangeCount = 0;

  if (beatIndex >= BEATS.length) return; // story complete

  const next = BEATS[beatIndex];
  updateBeatUI(next);
  playBeatOpener(next);

  // Unlock moment at beat 3+
  if (beatIndex >= 3 && !momentUnlocked) {
    momentUnlocked = true;
    const btn = document.getElementById('moment-btn');
    btn.disabled = false;
    btn.classList.add('is-ready');
  }

  // Show choice block at choice beat
  if (next.isChoice) {
    setTimeout(() => renderChoiceBlock(), 1200);
  }
}

// ── Choice block ──────────────────────────────────────────────────────────────
function renderChoiceBlock() {
  const choices = [
    { label: 'Stay with this.',   subtext: 'lean in' },
    { label: 'I\'m not going anywhere.', subtext: 'quiet commitment' },
    { label: 'I don\'t want to overthink it.', subtext: 'present' },
  ];
  const block = document.createElement('div');
  block.className = 'choice-block';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => {
      if (choiceMade) return;
      choiceMade = true;
      block.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add('chosen');
      // Send choice as user message
      input.value = c.label;
      sendMessage();
    };
    block.appendChild(btn);
  });
  thread.appendChild(block);
  thread.scrollTop = thread.scrollHeight;
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const val = input.value.trim();
  if (!val) return;

  addLine('You', val);
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;

  const beat = BEATS[beatIndex];
  const beatCtx = buildBeatContext(beat);

  try {
    const res = await fetch('/api/ai/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: val,
        context: {
          focusCharacter: 'Nina',
          active_app: { type: 'direct_chat', threadId: 'nina' },
          ...beatCtx
        }
      })
    });
    const data = await res.json();
    const responses = data?.result?.responses || [];
    const ninaResp  = responses.find(r => r.agent === 'Nina');
    const spoken    = ninaResp?.spoken;

    if (spoken) {
      // Slight delay — she thinks
      await delay(320 + Math.random() * 280);
      addLine('Nina', spoken, exchangeCount >= 1);
    } else {
      await delay(400);
      addLine('Nina', 'She goes quiet for a moment.');
    }

    exchangeCount++;

    // Check if beat should advance
    if (exchangeCount >= beat.minExchanges && beatIndex < BEATS.length - 1) {
      await delay(800);
      advanceBeat();
    }

  } catch (e) {
    addLine('Nina', 'She goes quiet for a moment.');
  } finally {
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Moment generation ─────────────────────────────────────────────────────────
document.getElementById('moment-btn').addEventListener('click', async () => {
  const btn     = document.getElementById('moment-btn');
  const wrap    = document.getElementById('moment-wrap');
  const img     = document.getElementById('moment-img');
  const caption = document.getElementById('moment-caption');

  btn.textContent = 'Rendering…';
  btn.disabled = true;
  btn.classList.remove('is-ready');

  try {
    const res = await fetch('/api/camera/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        character: 'Nina',
        sceneType: 'nostalgic',
        contextHint: 'Erotic portrait with full nudity, dramatic shadows, tasteful composition,Hardcore pornographic scene, explicit penetration, close-up view, realistic details '
      })
    });
    const data = await res.json();
    if (data.ok && data.shot?.path) {
      img.src  = data.shot.path;
      img.alt  = 'A moment with Nina';
      wrap.style.display = 'block';
      requestAnimationFrame(() => wrap.classList.add('visible'));
      caption.textContent = MOMENT_CAPTIONS[Math.floor(Math.random() * MOMENT_CAPTIONS.length)];
    } else {
      caption.textContent = 'The moment didn\'t arrive.';
      btn.textContent = 'Try again';
      btn.disabled = false;
    }
  } catch {
    caption.textContent = 'Couldn\'t reach the camera.';
    btn.textContent = 'Try again';
    btn.disabled = false;
  }
});

  'The way she looked when she thought you weren\'t watching.',
  'Some things are still there.',
  'Older now. Still her.',
  'The quiet that felt like home.',
  'She remembered everything.',
];
